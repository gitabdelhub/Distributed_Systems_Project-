server.port=8080

# Console H2 (base de données en mémoire pour la démo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:monitordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Initialisation du schéma au démarrage
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Logs
logging.level.com.monitor=INFO
logging.level.org.springframework.security=WARN
