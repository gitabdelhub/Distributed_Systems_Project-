server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:monitordb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / schema initialization
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# H2 console (accessible at /h2-console, ADMIN role required)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Spring Security auto-generated user (managed by UserDetailsService in SecurityConfig)
spring.security.user.name=
spring.security.user.password=
